<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>醫美診所分潤與獎金計算器</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5CF6', // purple-500
                        secondary: '#EC4899', // pink-500
                    }
                }
            }
        }
    </script>
    <style>
        .input-group:focus-within {
            @apply ring-2 ring-primary;
        }

        .slider-track {
            background: linear-gradient(to right, #8B5CF6, #EC4899);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-4 sm:p-6">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">醫美診所分潤與獎金計算器</h1>
            <p class="text-gray-600 mt-2">每月結帳後，依獲利分配分潤與業績獎金</p>
        </header>

        <!-- Settings Panel -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-primary" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                分潤設定
            </h2>

            <!-- Total Revenue Input -->
            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">本月總營收（NTD）</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">NT$</span>
                    <input type="number" id="totalRevenue"
                        class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                        placeholder="輸入金額，例如：1,000,000" value="1000000" />
                </div>
            </div>

            <!-- Profit Ratio Settings -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <h3 class="font-medium text-gray-700 mb-3">分潤比例設定（總和需 = 100%）</h3>
                    <div id="ratioInputs"></div>
                    <div class="mt-3 text-sm text-gray-600">
                        <span class="font-medium">目前總和：</span>
                        <span id="totalRatio" class="text-primary font-bold">100%</span>
                    </div>
                </div>

                <div>
                    <h3 class="font-medium text-gray-700 mb-3">業績獎金規則</h3>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm mb-1">達標門檻（NTD）</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">NT$</span>
                            <input type="number" id="bonusThreshold"
                                class="w-full pl-12 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                                value="800000" />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm mb-1">
                            獎金比例（達標後額外發放）
                            <span class="text-xs text-gray-500 ml-1">(例：5% = 總營收 × 5%)</span>
                        </label>
                        <div class="flex items-center">
                            <input type="range" id="bonusRateSlider" min="0" max="20" step="0.5" value="5"
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider-track" />
                            <span id="bonusRateDisplay" class="ml-3 w-16 text-right font-medium text-gray-800">5%</span>
                        </div>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-800">
                        💡 提示：獎金由診所額外支出，不影響分潤比例。
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="resetBtn"
                    class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium rounded-lg transition">
                    重設為預設值
                </button>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-secondary" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                分潤與獎金結果
            </h2>

            <div id="results" class="space-y-4">
                <!-- 結果將由 JS 動態生成 -->
            </div>

            <div class="mt-6 pt-4 border-t border-gray-200">
                <div class="flex justify-between items-center">
                    <span class="font-medium text-gray-700">總分潤金額（營收 × 100%）</span>
                    <span id="totalProfitDisplay" class="text-lg font-bold text-gray-900">NT$ 1,000,000</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="font-medium text-gray-700">業績獎金（達標後發放）</span>
                    <span id="bonusDisplay" class="text-lg font-bold text-secondary">NT$ 50,000</span>
                </div>
                <div class="flex justify-between items-center mt-2 pt-2 border-t border-gray-100">
                    <span class="font-bold text-gray-800">診所總支出</span>
                    <span id="totalPayoutDisplay" class="text-xl font-bold text-primary">NT$ 1,050,000</span>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-gray-500 text-sm">
            © 2024 醫美診所分潤系統 | 數據僅存在本機，關閉頁面後仍可保留設定
        </footer>
    </div>

    <script>
        // 預設設定
        const DEFAULT_SETTINGS = {
            ratios: {
                owner: 30,
                doctor: 40,
                nurse: 10,
                sales: 12,
                admin: 8
            },
            bonusThreshold: 800000,
            bonusRate: 5
        };

        // 職位中英文對照
        const ROLES = [
            { key: 'owner', name: '老闆', color: 'bg-purple-100 border-purple-500 text-purple-800' },
            { key: 'doctor', name: '醫生', color: 'bg-blue-100 border-blue-500 text-blue-800' },
            { key: 'nurse', name: '護士', color: 'bg-green-100 border-green-500 text-green-800' },
            { key: 'sales', name: '業務', color: 'bg-yellow-100 border-yellow-500 text-yellow-800' },
            { key: 'admin', name: '行政', color: 'bg-pink-100 border-pink-500 text-pink-800' }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            renderRatioInputs();
            updateResults();

            // 事件綁定
            document.getElementById('totalRevenue').addEventListener('input', updateResults);
            document.getElementById('bonusThreshold').addEventListener('input', updateResults);
            document.getElementById('bonusRateSlider').addEventListener('input', function () {
                document.getElementById('bonusRateDisplay').textContent = this.value + '%';
                updateResults();
            });
            document.getElementById('resetBtn').addEventListener('click', resetToDefault);
        });

        // 讀取設定（從 localStorage）
        function loadSettings() {
            const saved = localStorage.getItem('clinicProfitSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                // 套用比例
                Object.keys(settings.ratios).forEach(key => {
                    const input = document.querySelector(`input[data-role="${key}"]`);
                    if (input) input.value = settings.ratios[key];
                });
                // 套用獎金設定
                document.getElementById('bonusThreshold').value = settings.bonusThreshold;
                document.getElementById('bonusRateSlider').value = settings.bonusRate;
                document.getElementById('bonusRateDisplay').textContent = settings.bonusRate + '%';
            }
        }

        // 儲存設定
        function saveSettings() {
            const ratios = {};
            ROLES.forEach(role => {
                const input = document.querySelector(`input[data-role="${role.key}"]`);
                ratios[role.key] = parseFloat(input.value) || 0;
            });

            const settings = {
                ratios,
                bonusThreshold: parseFloat(document.getElementById('bonusThreshold').value) || 0,
                bonusRate: parseFloat(document.getElementById('bonusRateSlider').value) || 0
            };

            localStorage.setItem('clinicProfitSettings', JSON.stringify(settings));
        }

        // 產生比例輸入欄位
        function renderRatioInputs() {
            const container = document.getElementById('ratioInputs');
            container.innerHTML = '';

            ROLES.forEach(role => {
                const div = document.createElement('div');
                div.className = 'mb-4';
                div.innerHTML = `
          <label class="block text-gray-700 text-sm mb-1">${role.name}分潤比例</label>
          <div class="flex items-center">
            <input 
              type="number" 
              data-role="${role.key}"
              min="0" 
              max="100" 
              step="0.1"
              class="w-24 py-2 px-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent text-right"
              value="${DEFAULT_SETTINGS.ratios[role.key]}"
            />
            <span class="ml-2 text-gray-600">%</span>
          </div>
        `;
                container.appendChild(div);

                // 綁定事件
                div.querySelector('input').addEventListener('input', updateResults);
            });
        }

        // 更新比例總和顯示
        function updateTotalRatio() {
            let total = 0;
            ROLES.forEach(role => {
                const input = document.querySelector(`input[data-role="${role.key}"]`);
                total += parseFloat(input.value) || 0;
            });

            const totalRatioEl = document.getElementById('totalRatio');
            totalRatioEl.textContent = total.toFixed(1) + '%';

            // 若超過 100%，標紅警示
            if (Math.abs(total - 100) > 0.1) {
                totalRatioEl.classList.add('text-red-600');
            } else {
                totalRatioEl.classList.remove('text-red-600');
                totalRatioEl.classList.add('text-primary');
            }
        }

        // 計算並更新結果
        function updateResults() {
            updateTotalRatio();
            saveSettings();

            const revenue = parseFloat(document.getElementById('totalRevenue').value) || 0;
            const threshold = parseFloat(document.getElementById('bonusThreshold').value) || 0;
            const bonusRate = parseFloat(document.getElementById('bonusRateSlider').value) || 0;

            // 計算各職位分潤
            const ratios = {};
            ROLES.forEach(role => {
                const input = document.querySelector(`input[data-role="${role.key}"]`);
                ratios[role.key] = parseFloat(input.value) || 0;
            });

            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            let totalProfit = 0;
            ROLES.forEach(role => {
                const ratio = ratios[role.key] / 100;
                const amount = revenue * ratio;
                totalProfit += amount;

                const card = document.createElement('div');
                card.className = `p-4 rounded-lg border-l-4 ${role.color}`;
                card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-bold text-lg">${role.name}</h3>
              <p class="text-sm text-gray-600 mt-1">分潤比例：${ratios[role.key].toFixed(1)}%</p>
            </div>
            <div class="text-right">
              <div class="text-2xl font-bold">NT$ ${formatCurrency(amount)}</div>
              <div class="text-xs text-gray-500 mt-1">(${revenue.toLocaleString()} × ${ratios[role.key].toFixed(1)}%)</div>
            </div>
          </div>
        `;
                resultsContainer.appendChild(card);
            });

            // 計算獎金
            const bonus = revenue >= threshold ? (revenue * (bonusRate / 100)) : 0;

            // 更新底部統計
            document.getElementById('totalProfitDisplay').textContent = 'NT$ ' + formatCurrency(totalProfit);
            document.getElementById('bonusDisplay').textContent = 'NT$ ' + formatCurrency(bonus);
            document.getElementById('totalPayoutDisplay').textContent = 'NT$ ' + formatCurrency(totalProfit + bonus);
        }

        // 重設為預設值
        function resetToDefault() {
            // 重設比例
            Object.keys(DEFAULT_SETTINGS.ratios).forEach(key => {
                const input = document.querySelector(`input[data-role="${key}"]`);
                if (input) input.value = DEFAULT_SETTINGS.ratios[key];
            });
            // 重設獎金
            document.getElementById('bonusThreshold').value = DEFAULT_SETTINGS.bonusThreshold;
            document.getElementById('bonusRateSlider').value = DEFAULT_SETTINGS.bonusRate;
            document.getElementById('bonusRateDisplay').textContent = DEFAULT_SETTINGS.bonusRate + '%';

            // 清除 localStorage
            localStorage.removeItem('clinicProfitSettings');

            updateResults();
        }

        // 格式化貨幣（千分位）
        function formatCurrency(num) {
            return Math.round(num).toLocaleString('zh-TW');
        }
    </script>
</body>

</html>
