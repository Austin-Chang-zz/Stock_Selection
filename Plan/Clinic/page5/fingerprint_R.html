<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Auth Test</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { color: #333; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; display: none; }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .ng { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Biometric Test</h2>
    <p>Click below to test your fingerprint scanner.</p>
    
    <button id="btn-register">1. Register Fingerprint</button>
    <button id="btn-auth" disabled>2. Test Authentication</button>

    <div id="status-box"></div>
</div>

<script>
    const btnRegister = document.getElementById('btn-register');
    const btnAuth = document.getElementById('btn-auth');
    const statusBox = document.getElementById('status-box');

    let credentialId = null;

    // Helper to update UI
    function showResult(isPass, message) {
        statusBox.style.display = 'block';
        statusBox.className = isPass ? 'pass' : 'ng';
        statusBox.innerText = isPass ? `PASS: ${message}` : `NG: ${message}`;
    }

    // 1. REGISTER (Simulated setup)
    btnRegister.addEventListener('click', async () => {
        try {
            const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
            const userID = new Uint8Array(16); window.crypto.getRandomValues(userID);

            const publicKeyCredentialCreationOptions = {
                challenge,
                rp: { name: "Biometric Test Corp", id: window.location.hostname },
                user: { id: userID, name: "test@user.com", displayName: "Test User" },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }], // ES256
                authenticatorSelection: { userVerification: "required" },
                timeout: 60000
            };

            const credential = await navigator.credentials.create({ publicKey: publicKeyCredentialCreationOptions });
            
            if (credential) {
                credentialId = credential.rawId;
                btnAuth.disabled = false;
                showResult(true, "Fingerprint Registered!");
            }
        } catch (err) {
            showResult(false, "Registration Failed: " + err.message);
        }
    });

    // 2. AUTHENTICATE (The actual test)
    btnAuth.addEventListener('click', async () => {
        try {
            const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);

            const publicKeyCredentialRequestOptions = {
                challenge,
                allowCredentials: [{
                    id: credentialId,
                    type: 'public-key',
                }],
                userVerification: "required",
                timeout: 60000
            };

            const assertion = await navigator.credentials.get({ publicKey: publicKeyCredentialRequestOptions });

            if (assertion) {
                showResult(true, "Authentication Successful!");
            } else {
                showResult(false, "Authentication Denied.");
            }
        } catch (err) {
            showResult(false, "Authentication NG: " + err.message);
        }
    });

    // Check if browser supports WebAuthn
    if (!window.PublicKeyCredential) {
        showResult(false, "Browser does not support Biometrics.");
        btnRegister.disabled = true;
    }
</script>

</body>
</html>
